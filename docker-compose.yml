version: "3.8"

services:
  nextjs:
    build: ./next-app
    container_name: nextjs_app
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nextjs