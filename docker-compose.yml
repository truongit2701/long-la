version: "3.8"

services:
  web: 
    image: truongvovanit/long-la:latest # <-- Đã đổi thành pull từ Hub
    container_name: longla_web
    env_file:
      - .env.production
    expose:
      - "80" 

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
dock